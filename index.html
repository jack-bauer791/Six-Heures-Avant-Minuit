<script>
(function() {
  // APRÈS 18H active de 18h00 à 19h00 exactement
  // AVANT 18H tout le reste du temps

  function getMode() {
    var now = new Date();
    var total = now.getHours() * 60 + now.getMinutes();
    // 18h00 = 1080 min, 19h00 = 1140 min
    return (total >= 18*60 && total < 19*60) ? 'apres' : 'avant';
  }

  function applyMode(mode) {
    document.getElementById('avant').classList.toggle('active', mode === 'avant');
    document.getElementById('apres').classList.toggle('active', mode === 'apres');
  }

  applyMode(getMode());

  // Vérification toutes les 10 secondes
  setInterval(function() {
    applyMode(getMode());
  }, 10000);

})();
</script>
